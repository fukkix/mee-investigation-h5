<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码访问调查表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #006b53 0%, #3cb391 100%);
            color: white;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #006b53;
            margin-bottom: 10px;
        }
        .url {
            background: #f8f9fb;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            color: #006b53;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }
        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        .tip {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>📱 生态环境技术调查填报</h1>
        <p style="color: #666;">请使用手机扫描二维码访问</p>
        
        <div id="qrcode"></div>
        
        <div class="url">
            <strong>访问地址：</strong><br>
            <span id="urlText"></span>
        </div>
        
        <div class="tip">
            💡 提示：请确保手机和电脑在同一WiFi网络
        </div>
    </div>

    <script>
        // 使用局域网IP地址
        const surveyUrl = 'http://192.168.3.105:8080/survey.html';
        document.getElementById('urlText').textContent = surveyUrl;
        
        // 生成二维码
        new QRCode(document.getElementById("qrcode"), {
            text: surveyUrl,
            width: 256,
            height: 256,
            colorDark: "#006b53",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
