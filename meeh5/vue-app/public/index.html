<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>生态环境技术调查填报</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#f8f9fb",
            "surface-container-highest": "#e0e3e5",
            "inverse-surface": "#2d3133",
            "on-tertiary-container": "#004117",
            "outline-variant": "#bccac2",
            "on-primary": "#ffffff",
            "secondary-fixed": "#bde9ff",
            "on-secondary": "#ffffff",
            "inverse-on-surface": "#eff1f3",
            "surface-container-low": "#f2f4f6",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#191c1e",
            "on-tertiary-fixed-variant": "#005320",
            "tertiary-fixed-dim": "#6ddd81",
            "on-tertiary": "#ffffff",
            "secondary": "#386476",
            "inverse-primary": "#68dab6",
            "surface": "#f8f9fb",
            "surface-dim": "#d8dadc",
            "tertiary": "#006e2c",
            "on-primary-fixed": "#002117",
            "error-container": "#ffdad6",
            "on-secondary-fixed": "#001f29",
            "surface-container-high": "#e6e8ea",
            "on-tertiary-fixed": "#002108",
            "tertiary-fixed": "#89fa9b",
            "surface-container": "#eceef0",
            "error": "#ba1a1a",
            "on-primary-container": "#003f30",
            "surface-tint": "#006b53",
            "outline": "#6d7a74",
            "on-background": "#191c1e",
            "on-secondary-container": "#3d687b",
            "tertiary-container": "#43b55e",
            "primary-fixed": "#86f7d1",
            "secondary-fixed-dim": "#a1cde2",
            "primary-fixed-dim": "#68dab6",
            "surface-variant": "#e0e3e5",
            "on-primary-fixed-variant": "#00513e",
            "surface-bright": "#f8f9fb",
            "on-surface-variant": "#3d4944",
            "secondary-container": "#bae6fc",
            "on-error-container": "#93000a",
            "primary-container": "#3cb391",
            "on-secondary-fixed-variant": "#1e4c5d",
            "primary": "#006b53",
            "on-error": "#ffffff"
          },
          borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
          fontFamily: { headline: ["Manrope"], body: ["Inter"], label: ["Inter"] }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    .step-hidden { display: none; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .border-error { border-color: #ba1a1a !important; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    #companySearchResults { max-height: 300px; }
    #companySearchResults::-webkit-scrollbar { width: 6px; }
    #companySearchResults::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    #companySearchResults::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    #companySearchResults::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-24">
  <div id="app"></div>
</body>
</html>
